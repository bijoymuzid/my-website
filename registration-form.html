<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="registration-style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .form-container {
            background: #fff;
            max-width: 750px;
            width: 100%;
            padding: 35px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .form-container h1 {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-container .subtitle {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 18px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 18px;
        }

        .form-group {
            flex: 1 1 calc(50% - 9px);
            min-width: 200px;
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            flex: 1 1 100%;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
            margin-bottom: 5px;
        }

        .form-group label span.required {
            color: #e74c3c;
        }

        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background: #fff;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        @media (max-width: 580px) {
            .form-container {
                padding: 25px 18px;
            }

            .form-group {
                flex: 1 1 100%;
            }

            .btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1> Registration Form</h1>
        <p class="subtitle">Please fill in all the required fields</p>

        <form id="registrationForm" onsubmit="return handleSubmit(event)">

            
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Your Name <span class="required"></span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required />
                </div>
                <div class="form-group">
                    <label for="fatherName">Father's Name <span class="required"></span></label>
                    <input type="text" id="fatherName" name="fatherName" placeholder="Enter father's name" required />
                </div>
            </div>

            <!-- Row 2 -->
            <div class="form-row">
                <div class="form-group">
                    <label for="motherName">Mother's Name <span class="required"></span></label>
                    <input type="text" id="motherName" name="motherName" placeholder="Enter mother's name" required />
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth <span class="required"></span></label>
                    <input type="date" id="dob" name="dob" required />
                </div>
            </div>

        
            <div class="form-row">
                <div class="form-group">
                    <label for="mobile">Mobile Number <span class="required"></span></label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required />
                </div>
                <div class="form-group">
                    <label for="fatherNumber">Father's Number</label>
                    <input type="tel" id="fatherNumber" name="fatherNumber" placeholder="Enter father's number" />
                </div>
            </div>

            
            <div class="form-row">
                <div class="form-group">
                    <label for="motherNumber">Mother's Number</label>
                    <input type="tel" id="motherNumber" name="motherNumber" placeholder="Enter mother's number" />
                </div>
                <div class="form-group">
                    <label for="religion">Religion <span class="required"></span></label>
                    <select id="religion" name="religion" required>
                        <option value="">Select Religion</option>
                        <option value="islam">Islam</option>
                        <option value="hinduism">Hinduism</option>
                        <option value="christianity">Christianity</option>
                        <option value="buddhism">Buddhism</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            
            <div class="form-row">
                <div class="form-group">
                    <label for="nationality">Nationality <span class="required"></span></label>
                    <input type="text" id="nationality" name="nationality" placeholder="Enter your nationality" required />
                </div>
                <div class="form-group">
                    <label for="country">Choose Country <span class="required"></span></label>
                    <select id="country" name="country" required>
                        <option value="">Select Country</option>
                        <option value="bangladesh">Bangladesh</option>
                        <option value="india">India</option>
                        <option value="pakistan">Pakistan</option>
                        <option value="canada">Canada</option>
                        <option value="australia">Australia</option>
                        <option value="germany">Germany</option>
                        <option value="france">France</option>
                        <option value="japan">Japan</option>
                        <option value="china">China</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="language">Choose Language <span class="required"></span></label>
                    <select id="language" name="language" required>
                        <option value="">Select Language</option>
                        <option value="bangla">Bangla</option>
                        <option value="english">English</option>
                        <option value="hindi">Hindi</option>
                        <option value="arabic">Arabic</option>
                        <option value="chinese">Chinese</option>
                        <option value="japanese">Japanese</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="gender">Gender <span class="required"></span></label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-submit"> Submit</button>
            </div>

        </form>
    </div>

    <script src="registration-script.js"></script>
    <script>
        function handleSubmit(event) {
            event.preventDefault();

            const form = document.getElementById('registrationForm');

            if (!form.checkValidity()) {
                form.reportValidity();
                return false;
            }

            const name        = document.getElementById('name').value.trim();
            const fatherName  = document.getElementById('fatherName').value.trim();
            const motherName  = document.getElementById('motherName').value.trim();
            const dob         = document.getElementById('dob').value;
            const mobile      = document.getElementById('mobile').value.trim();
            const fatherNum   = document.getElementById('fatherNumber').value.trim();
            const motherNum   = document.getElementById('motherNumber').value.trim();
            const religion    = document.getElementById('religion').value;
            const nationality = document.getElementById('nationality').value.trim();
            const country     = document.getElementById('country').value;
            const language    = document.getElementById('language').value;
            const gender      = document.getElementById('gender').value;

            const summary =
                ` Registration Successful!\n\n` +
                `Name            : ${name}\n` +
                `Father's Name   : ${fatherName}\n` +
                `Mother's Name   : ${motherName}\n` +
                `Date of Birth   : ${dob}\n` +
                `Mobile          : ${mobile}\n` +
                `Father's Number : ${fatherNum || '—'}\n` +
                `Mother's Number : ${motherNum || '—'}\n` +
                `Religion        : ${religion}\n` +
                `Nationality     : ${nationality}\n` +
                `Country         : ${country}\n` +
                `Language        : ${language}\n` +
                `Gender          : ${gender}`;

            alert(summary);
            return false;
        }

    </script>

</body>
</html>
